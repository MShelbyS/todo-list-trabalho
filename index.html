<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Gerenciador de Tarefas</h1>
</header>

<main>

<section class="form-section">

<h2>Nova Tarefa</h2>

<form id="taskForm">

<input type="text" id="title" placeholder="Título da tarefa">

<textarea id="description" placeholder="Descrição da tarefa"></textarea>

<select id="priority">
<option value="Baixa">Baixa</option>
<option value="Média">Média</option>
<option value="Alta">Alta</option>
</select>

<button type="submit">Adicionar Tarefa</button>

</form>

</section>


<section class="list-section">

<h2>Lista de Tarefas</h2>

<input type="text" id="search" placeholder="Pesquisar tarefa">

<ul id="taskList"></ul>

</section>

</main>

<footer>
<p>Sistema desenvolvido para a disciplina de Programação Web</p>
</footer>

<script src="script.js"></script>

</body>
</html>
